name: xi_game
description: "XI - Un juego de cartas de horror y suspenso psicológico"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter

  # Motor de juegos para pixel art
  flame: ^1.18.0

  # Audio con capas dinámicas
  audioplayers: ^6.0.0

  # Guardado de progreso local
  shared_preferences: ^2.2.3

  # Inyección de dependencias
  get_it: ^7.6.7

  # Animaciones de UI
  flutter_animate: ^4.5.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sprites/
    - assets/sprites/characters/
    - assets/sprites/gatekeeper/
    - assets/sprites/environments/
    - assets/sprites/cards/
    - assets/sprites/ui/
    - assets/audio/music/
    - assets/audio/sfx/
    - assets/story/
